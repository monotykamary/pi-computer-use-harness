name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck and tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm test

      - name: Check commit messages
        if: github.event_name == 'pull_request'
        run: npm run test:commits -- ${{ github.event.pull_request.base.sha }}..${{ github.sha }}
